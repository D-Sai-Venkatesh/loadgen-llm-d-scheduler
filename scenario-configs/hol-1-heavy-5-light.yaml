profiles:
  heavy-aggressive:
    prompt_tokens: 2000
    max_tokens: 2000
    concurrency: 4
    total_requests: 200
    request_timeout: 1200
  light-slow:
    prompt_tokens: 100
    max_tokens: 50
    concurrency: 4
    total_requests: 40
    request_timeout: 1200

scenario:
  name: production-mix
  model: meta-llama/Llama-3.1-8B-Instruct
  max_num_seqs: 2
  window: 240
  spread: 1
  total_programs: 6
  warmup:
    total_requests: 0
    concurrency: 4
    prompt_tokens: 128
    max_tokens: 64
  programs:
    - profile: heavy-aggressive
      ratio: 0.166
      window: [0, 0]
    - profile: light-slow
      ratio: 0.833