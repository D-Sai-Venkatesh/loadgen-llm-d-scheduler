# Generated scenario: production-mix
# Programs: 6  total_requests: 400  max-num-seqs: 2
name: production-mix
model: meta-llama/Llama-3.1-8B-Instruct
infra:
  kind: true
  namespace: default
  vllm:
    extra_args:
    - --latency-calculator=per-token
    - --prefill-overhead=6ms
    - --prefill-time-per-token=17us
    - --inter-token-latency=5ms
    - --max-num-seqs=2
    - --max-model-len=100000
test:
  warmup:
    total_requests: 0
    concurrency: 4
    prompt_tokens: 128
    max_tokens: 64
programs:
  fg-light-slow-000:
    total_requests: 40
    concurrency: 4
    prompt_tokens: 100
    max_tokens: 50
    start_time: 0
    request_timeout: 1200
    no_fairness_header: false
    initial_request_interval: 2
  fg-light-slow-001:
    total_requests: 40
    concurrency: 4
    prompt_tokens: 100
    max_tokens: 50
    start_time: 150
    request_timeout: 1200
    no_fairness_header: false
    initial_request_interval: 2
  fg-light-slow-002:
    total_requests: 40
    concurrency: 4
    prompt_tokens: 100
    max_tokens: 50
    start_time: 300
    request_timeout: 1200
    no_fairness_header: false
    initial_request_interval: 2
  fg-light-slow-003:
    total_requests: 40
    concurrency: 4
    prompt_tokens: 100
    max_tokens: 50
    start_time: 450
    request_timeout: 1200
    no_fairness_header: false
    initial_request_interval: 2
  fg-light-slow-004:
    total_requests: 40
    concurrency: 4
    prompt_tokens: 100
    max_tokens: 50
    start_time: 600
    request_timeout: 1200
    no_fairness_header: false
    initial_request_interval: 2
  fg-heavy-aggressive-000:
    total_requests: 200
    concurrency: 4
    prompt_tokens: 2000
    max_tokens: 2000
    start_time: 0
    request_timeout: 1200
    no_fairness_header: false
    initial_request_interval: 2
phases:
- name: program-aware-service
  epp_config: configs/program-aware-service.yaml
  metrics_subsystem: program_aware
- name: program-aware-drr
  epp_config: configs/program-aware-drr.yaml
  metrics_subsystem: program_aware
- name: round-robin
  epp_config: configs/program-aware-rr.yaml
  metrics_subsystem: program_aware
